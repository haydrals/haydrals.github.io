<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Work</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Reset some default styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.6;
            background-color: #f9f9f9;
            color: #333;
            padding: 20px;
        }

        /* Navigation bar styling */
        nav.top-nav {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            background-color: #4CAF50;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        nav a:hover,
        nav a.active {
            color: #ffeb3b;
            text-decoration: underline;
        }
        /* Headings */
        h1 {
            margin-bottom: 20px;
            text-align: center;
            color: #222;
        }

        h2 a {
            color: #4CAF50;
            text-decoration: none;
            font-size: 1.2rem;
        }

        h2 a:hover {
            text-decoration: underline;
        }

        /* Image styling */
        section img {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 20px auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        section {
            text-align: center;
            margin-bottom: 40px;
        }

        /* Footer styling */
        footer {
            text-align: center;
            font-size: 0.9rem;
            color: #666;
            padding: 10px 0;
            border-top: 1px solid #ddd;
        }
        /* Additional box styling */
        .box-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 30px 0;
        }

        .box {
            background-color: #f4f4f4;
            border: 2px solid #4CAF50;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            width: 200px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .box:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .box a {
            text-decoration: none;
            font-weight: bold;
            color: #4CAF50;
        }

        .box a:hover {
            color: #ff9800;
        }
    </style>
</head>
