<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Page</title>
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.6;
            background-color: #f9f9f9;
            color: #333;
            padding: 20px;
        }

        /* Navigation bar styling */
        nav.top-nav {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            background-color: #4CAF50;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        nav a:hover,
        nav a.active {
            color: #ffeb3b;
            text-decoration: underline;
        }

        h1, h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        h2 {
            color: #4CAF50;
        }

        /* Paragraphs */
        p {
            max-width: 700px;
            margin: 0 auto 30px auto;
            text-align: center;
        }

        /* Footer styling */
        footer {
            text-align: center;
            font-size: 0.9rem;
            color: #666;
            padding: 10px 0;
            border-top: 1px solid #ddd;
            margin-top: 40px;
        }

        /* Optional: Holy Grail layout note */
        section {
            max-width: 900px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="index.html" class="active">Home</a>
        <a href="Lab Work.html" class="active">Lab Work</a>
        <a href="projects.html" class="active">Projects</a>
    </nav>

    <h1>Welcome to My Blog</h1>
    <section>
        <h2>Holy Grail Layout</h2>
        <p>This page uses a simple layout idea inspired by the "Holy Grail" layout. Content sections can be expanded here for posts or other blog material.</p>
    </section>

    <footer>
        <p>Thanks for visiting my Blog page!</p>
    </footer>
</body>
</html>
