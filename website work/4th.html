<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4th Page</title>
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.6;
            background-color: #f9f9f9;
            color: #333;
            padding: 20px;
        }

        /* Navigation bar styling */
        nav.top-nav {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            background-color: #4CAF50;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        nav a:hover,
        nav a.active {
            color: #ffeb3b;
            text-decoration: underline;
        }

        /* Headings */
        h1 {
            text-align: center;
            font-size: 28pt;
            color: red;
            margin-bottom: 20px;
        }

        h2 {
            text-align: center;
            font-size: 16pt;
            color: maroon;
            margin-bottom: 20px;
        }

        /* Paragraph */
        p {
            text-align: center;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        /* Footer styling */
        footer {
            text-align: center;
            font-size: 0.9rem;
            color: #666;
            padding: 10px 0;
            border-top: 1px solid #ddd;
            margin-top: 40px;
        }
    </style>
</head>
