<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Selection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="container">
       <form id="characterForm" method="get" action="page3.html">
        <fieldset>
            <legend>Choose Your Character</legend>
            <p>
                <input type="radio" id="aria" name="character" value="aria" required>
                <label for="aria">Aria, the Warrior</label>
            </p>
            <p>
                <input type="radio" id="eldrin" name="character" value="eldrin">
                <label for="eldrin">Eldrin, the Mage</label>
            </p>
            <P>
                <input type="radio" id="tara" name="character" value="tara">
                <label for="tara">Tara, the Rogue</label><br>
            </p>
        </fieldset>
        <input type="submit" value="Continue">
       </form>
    </section>
</body>
</html>
